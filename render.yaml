services:
  - type: web
    name: ems-web-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: APP_ENV
        value: production
      - key: MONGO_URI
        sync: false
      - key: MONGO_DB_NAME
        value: employee_attendance
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: JWT_ALGORITHM
        value: HS256
      - key: JWT_EXPIRE_MINUTES
        value: 720
      - key: LOGIN_RATE_LIMIT_ATTEMPTS
        value: 5
      - key: LOGIN_RATE_LIMIT_WINDOW_SECONDS
        value: 900
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: COOKIE_SECURE
        value: true
      - key: COOKIE_SAMESITE
        value: none
      - key: ADMIN_EMPLOYEE_ID
        value: 777
      - key: ADMIN_USERNAME
        sync: false
      - key: ADMIN_NAME
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
